    patch:
      tags: [sessions]
      summary: End a session
      description: |
        End an active session. Only the session owner can call this.
        Sets `endedAt`, calculates `energyKwh` and `cost`, transitions to `completed`.
      operationId: endSession
      security:
        - bearerAuth: []
          tenantId: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
