  # ── Sessions ──────────────────────────────────────────────────────────────────
  /sessions:
    get:
      tags: [sessions]
      summary: List own sessions
      description: Returns only the caller's sessions. Requires any tenant role.
      operationId: listSessions
      security:
        - bearerAuth: []
          tenantId: []
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: Paginated session list
          content:
            application/json:
              schema:
                type: object
                required: [data, total]
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SessionResponse'
                  total:
                    type: integer
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
    post:
      tags: [sessions]
      summary: Start a session
      description: |
        Start a charging session on a plug. Any tenant role.
        A tariff is resolved at start time; `tariffId` is null if none matched.
      operationId: startSession
      security:
        - bearerAuth: []
          tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StartSessionRequest'
      responses:
        '201':
          description: Session started (status=active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '400':
          $ref: '#/components/responses/400'
        '401':
          $ref: '#/components/responses/401'
        '403':
          $ref: '#/components/responses/403'
        '404':
          description: Plug not found in this tenant
          content:
            application/problem+json:
              schema:
                $ref: '#/components/schemas/ProblemDetails'

  /sessions/{id}:
    get:
      tags: [sessions]
      summary: Get a session
      description: |
        Regular users can only retrieve their own sessions.
        `tenant_admin` can retrieve any session in the tenant.
      operationId: getSession
      security:
        - bearerAuth: []
          tenantId: []
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Session details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionResponse'
        '401':
          $ref: '#/components/responses/401'
        '403':
